name: Build Rust binary (cross-platform)

# Builds and uploads the `robotcode` Rust binary for all supported platforms.
# Triggered on version tags and manual dispatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload binaries as workflow artifacts"
        required: false
        default: "true"
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: robotcode

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: robotcode
            cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: robotcode

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: robotcode

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: robotcode.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross == true
        run: cargo install cross --version 0.2.5 --locked

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} -p robotcode

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} -p robotcode

      - name: Rename binary with target suffix
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ext="${{ matrix.binary == 'robotcode.exe' && '.exe' || '' }}"
          dst="dist/robotcode-${{ matrix.target }}${ext}"
          cp "$src" "$dst"
          echo "Binary: $dst"

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: robotcode-${{ matrix.target }}
          path: dist/
          retention-days: 30

  release:
    name: Attach binaries to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
